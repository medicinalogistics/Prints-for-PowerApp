<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Report</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; color: #333; background: #f9f9f9; }
        .report-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #0369A1; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #0369A1; font-size: 28px; }
        .header p { margin: 5px 0 0 0; color: #666; }
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .summary-box { background: #F0F9FF; padding: 15px; border-left: 5px solid #3B82F6; border-radius: 4px; }
        .summary-box strong { display: block; font-size: 12px; color: #075985; text-transform: uppercase; margin-bottom: 5px; }
        .summary-box span { font-size: 16px; font-weight: bold; color: #111; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 14px; font-weight: bold; color: white; }
        .status-delivered { background-color: #16A34A; }
        .status-pending { background-color: #D97706; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f1f5f9; color: #334155; font-weight: 600; }
        @media print {
            body { background: white; }
            .report-container { box-shadow: none; padding: 0; }
            button { display: none; }
        }
        .print-btn { background: #0369A1; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        .print-btn:hover { background: #0284C7; }
    </style>
</head>
<body>

    <div class="report-container">
        <button class="print-btn" onclick="window.print()">🖨️ Print Report</button>
        
        <div class="header">
            <div>
                <h1>Delivery Report</h1>
                <p>Generated: <span id="genDate"></span></p>
            </div>
            <div style="text-align: right;">
                <h2 style="margin: 0; color: #111;" id="pharmacyName">Loading...</h2>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-box">
                <strong>Delivery Status</strong>
                <span id="deliveryStatus" class="status-badge status-pending">Loading...</span>
            </div>
            <div class="summary-box">
                <strong>Delivery Time</strong>
                <span id="deliveryTime">Loading...</span>
            </div>
            <div class="summary-box">
                <strong>Total Containers</strong>
                <span id="containerCount">0</span>
            </div>
            <div class="summary-box">
                <strong>Driver Name</strong>
                <span id="driverName">Loading...</span>
            </div>
            <div class="summary-box">
                <strong>Receiver Details</strong>
                <span id="receiverName">Loading...</span> <span style="font-size: 14px; color: #555;">(ID: <span id="receiverID"></span>)</span>
            </div>
            <div class="summary-box">
                <strong>GPS Location</strong>
                <span id="locationGPS" style="font-size: 14px;">Loading...</span>
            </div>
        </div>

        <h3>Delivery Details</h3>
        <table id="detailsTable">
            <thead>
                <tr>
                    <th>TR Number</th>
                    <th>Voucher Number</th>
                    <th>Tracker Status</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

<script>
    document.getElementById('genDate').innerText = new Date().toLocaleString();

    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('data');

    if (encodedData) {
        try {
            // 1. Unpack the minified JSON
            const data = JSON.parse(decodeURIComponent(encodedData));

            // 2. Map data to HTML
            document.getElementById('pharmacyName').innerText = data.P || "Unknown";
            document.getElementById('containerCount').innerText = data.C || "0";
            
            // 🌟 FIXED: Delivery Time Mapping Added
            document.getElementById('deliveryTime').innerText = data.D || "N/A";
            
            // Handle Status
            const statusBadge = document.getElementById('deliveryStatus');
            statusBadge.innerText = data.S || "Pending";
            if ((data.S || "").toLowerCase().includes("delivered")) {
                statusBadge.className = "status-badge status-delivered";
            }

            // Populate the new Driver/Receiver/GPS elements
            if(document.getElementById('driverName')) document.getElementById('driverName').innerText = data.Dr || "N/A";
            if(document.getElementById('receiverName')) document.getElementById('receiverName').innerText = data.RN || "N/A";
            if(document.getElementById('receiverID')) document.getElementById('receiverID').innerText = data.RI || "N/A";
            if(document.getElementById('locationGPS')) document.getElementById('locationGPS').innerText = (data.Lat && data.Lon) ? `${data.Lat}, ${data.Lon}` : "N/A";

            // 3. UNPACK THE TR STRING, SPLIT COMMAS, AND REMOVE DUPLICATES
            const tbody = document.getElementById('detailsTable').querySelector('tbody');
            if (data.R) {
                const rowsArray = data.R.split('^'); 
                
                // 🌟 MAGIC: This Set will remember every TR we print so we never print it twice!
                const seenTRs = new Set(); 
                
                rowsArray.forEach(rowString => {
                    const cols = rowString.split('|'); 
                    
                    if (cols.length >= 2) {
                        const rawTRString = cols[0]; // This might be "TR123, TR456"
                        const statusText = cols[1];
                        
                        let statusClass = "status-pending";
                        if (statusText.toLowerCase().includes("delivered")) statusClass = "status-delivered";

                        // 🌟 MAGIC: Split the TR string by commas in case there are multiple
                        const individualTRs = rawTRString.split(',');

                        individualTRs.forEach(singleTR => {
                            // Remove any extra spaces from the TR number
                            const cleanTR = singleTR.trim(); 

                            // 🚨 CHECK: If the TR is not empty, not "-", AND we haven't seen it yet...
                            if (cleanTR !== "" && cleanTR !== "-" && !seenTRs.has(cleanTR)) {
                                
                                // Add it to our memory so we don't print it again (Removes Duplicates!)
                                seenTRs.add(cleanTR); 

                                // Build the row
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td><strong>${cleanTR}</strong></td>
                                    <td><span class="status-badge ${statusClass}">${statusText}</span></td> 
                                `;
                                tbody.appendChild(tr);
                            }
                        });
                    }
                });
            }
        } catch (error) {
            console.error("Error parsing data:", error);
            document.getElementById('pharmacyName').innerText = "Data Error.";
        }
    }
</script>
</body>
</html>
