<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packing QR Labels</title>
    <style>
        /* Exact page dimensions for sticker */
        @page { size: 10cm 6cm; margin: 0; }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #fff; 
        }

        .qr-item {
            width: 10cm; 
            height: 5.9cm; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center; 
            box-sizing: border-box;
            padding: 2mm; 
            page-break-after: always;
            overflow: hidden; 
        }

        /* 🌟 FIX 1 & 2: Header is now Larger, Semi-Bold, and has NO underline */
        .header-store { 
            font-size: 16pt; 
            font-weight: 600; /* Semi-bold */
            text-transform: uppercase; 
            margin: 0 0 2mm 0; 
            color: #000;
            line-height: 1.2; 
            width: 95%;
        }

        .qr-item img { 
            width: 3.2cm; 
            height: 3.2cm; 
            object-fit: contain; 
            margin-top: 1mm;
            margin-bottom: 2mm;
        }

        /* 🌟 FIX 3: Container Info is now Normal weight (not bold) */
        .container-info { 
            font-size: 14pt; 
            font-weight: normal; /* Standard text weight */
            color: #000; 
            margin: 0;
            line-height: 1.1; 
        }

        @media print { 
            body { margin: 0; } 
            .qr-item { page-break-after: always; break-after: page; } 
        }
    </style>
</head>
<body>
    <div id="qrContainer">Loading labels...</div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        const qrContainer = document.getElementById('qrContainer');

        if (!dataParam) {
            qrContainer.innerHTML = 'Error: No data found.';
        } else {
            try {
                const qrData = JSON.parse(decodeURIComponent(dataParam));
                qrContainer.innerHTML = '';
                
                qrData.forEach(item => {
                    const qrCodeURL = "https://api.qrserver.com/v1/create-qr-code/?data=" + 
                                     encodeURIComponent(item.BarcodeID) + "&size=300x300";
                    
                    const div = document.createElement('div');
                    div.className = 'qr-item';
                    
                    div.innerHTML = `
                        <div class="header-store">${item.ShippingPharmacy || 'INTERNAL TRANSFER'}</div>
                        <img src="${qrCodeURL}" alt="QR Code">
                        <div class="container-info">${item.ContainerInfo || ''}</div>
                    `;
                    
                    qrContainer.appendChild(div);
                });
            } catch (e) { 
                qrContainer.innerHTML = 'Error parsing data.'; 
            }
        }
    </script>
</body>
</html>
