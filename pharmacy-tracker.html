<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pharmacy Delivery Tracker</title>
    <style>
        @page { size: A4 portrait; margin: 12mm 10mm 12mm 10mm; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; color: #000; font-size: 11px; background-color: #fff; }
        .container { padding: 2mm; }
        
        header { border-bottom: 3px solid #0056b3; margin-bottom: 12px; padding-bottom: 10px; width: 100%; }
        .header-table { width: 100%; border: none; margin: 0; }
        .header-table td { border: none; padding: 0; vertical-align: middle; }
        .logo-box img { height: 60px; max-width: 150px; object-fit: contain; }
        .qr-header-box img { height: 75px; width: 75px; border: 2px solid #0056b3; padding: 3px; border-radius: 4px; background-color: #fff; }
        
        .title { font-size: 18pt; font-weight: 700; margin: 0; color: #0056b3; text-transform: uppercase; text-align: center; }
        .tracker-id { font-size: 11pt; font-weight: 600; margin-top: 5px; color: #333; text-align: center; }
        
        .details-table { width: 100%; border: 1px solid #b3d4f5; margin-bottom: 15px; font-size: 10.5pt; background-color: #f8fbff; padding: 12px; border-left: 6px solid #0056b3; }
        .details-table td { border: none; padding: 4px 6px; text-align: left; }
        
        .summary-grid { margin-top: 5px; margin-bottom: 20px; display: flex; justify-content: space-between; text-align: center; font-size: 10px; }
        .grid-card { padding: 6px 4px; border-radius: 4px; flex: 1; margin: 0 3px; border: 1px solid #b3d4f5; background: #f8fbff; border-top: 3px solid #0056b3; }
        .card-val { font-size: 16px; font-weight: 700; margin-top: 3px; display: block; color: #0056b3; }

        table.data-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table.data-table th, table.data-table td { border: 1px solid #b3d4f5; padding: 9px 4px; text-align: center; vertical-align: middle; }
        table.data-table td.multi-line { white-space: pre-wrap; text-align: left; padding-left: 8px; font-weight: 600; }
        table.data-table th { background-color: #0056b3; font-weight: 700; color: #fff; font-size: 8.5pt; }
        .total-row { font-weight: bold; background-color: #e6f2ff !important; border-top: 2.5px solid #0056b3; }
        
        .ack-section { font-size: 10pt; margin-top: 25px; text-align: justify; border-top: 2px solid #0056b3; padding-top: 15px; margin-bottom: 25px; line-height: 1.6; font-style: italic; color: #333; }
        .signatures-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .signatures-table td { width: 50%; padding: 10px; font-size: 10.5pt; font-weight: 600; vertical-align: bottom; height: 70px; }
        .sig-line { border-bottom: 1px solid #000; width: 80%; display: inline-block; margin-bottom: 5px; }

        .barcodes-page { page-break-before: always; text-align: center; padding-top: 8mm; }
        .barcodes-title { border-bottom: 2px solid #0056b3; padding-bottom: 12px; font-size: 15pt; font-weight: 700; margin-bottom: 25px; text-transform: uppercase; color: #0056b3; }
        .barcode-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 20px; }
        .barcode-item { border: 1px solid #b3d4f5; padding: 10px; background: #f8fbff; border-radius: 4px; display: inline-block; min-width: 170px; }
        .barcode-item img { width: 165px; height: 48px; display: block; margin: 0 auto; }
